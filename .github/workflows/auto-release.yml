name: Auto Release

# Automatically bump patch version and create release on merge to main
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'

permissions:
  contents: write

jobs:
  auto-release:
    name: Bump version and release
    runs-on: ubuntu-latest
    # Skip if the commit message already contains a version bump
    if: "!contains(github.event.head_commit.message, 'Bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          # Bump patch version
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump versions
        run: |
          NEW=${{ steps.version.outputs.new }}
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/VERSION = \".*\"/VERSION = \"$NEW\"/" python/tmuch/cli.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml pyproject.toml python/tmuch/cli.py
          git commit -m "Bump version to v${{ steps.version.outputs.new }} [auto-release]" || exit 0
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags
