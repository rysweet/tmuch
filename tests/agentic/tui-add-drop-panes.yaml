scenario:
  name: "tmuch Add and Drop Panes"
  description: "Verify adding panes with Ctrl-A and dropping with Ctrl-D reflows layout"
  type: tui
  tags: [critical, tui, pane-management]

  prerequisites:
    - "./target/release/tmuch binary exists"
    - "tmux is installed"

  steps:
    - action: launch
      target: "./target/release/tmuch"
      args: ["test-pane-a"]
      description: "Launch with one session"

    - action: wait_for_screen
      contains: "[1/1]"
      timeout: 3s
      description: "Should show 1 pane"

    - action: send_keypress
      value: "ctrl-a"
      description: "Add a new pane"

    - action: wait_for_screen
      contains: "[2/2]"
      timeout: 3s
      description: "Should reflow to 2 panes"

    - action: capture_screenshot
      save_as: "after-add-pane.txt"

    - action: send_keypress
      value: "ctrl-a"
      description: "Add another pane"

    - action: wait_for_screen
      contains: "[3/3]"
      timeout: 3s
      description: "Should reflow to 3 panes (2x2 grid)"

    - action: capture_screenshot
      save_as: "three-panes-grid.txt"

    - action: send_keypress
      value: "ctrl-d"
      description: "Drop the focused pane"

    - action: wait_for_screen
      contains: "[2/2]"
      timeout: 3s
      description: "Should reflow back to 2 panes"

    - action: send_keypress
      value: "ctrl-q"
