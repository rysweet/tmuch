scenario:
  name: "tmuch Configurable Key Bindings"
  description: "Verify --bind creates command bindings that spawn new panes"
  type: tui
  tags: [critical, tui, bindings]

  prerequisites:
    - "./target/release/tmuch binary exists"
    - "tmux is installed"

  steps:
    - action: launch
      target: "./target/release/tmuch"
      args: ["-b", "1=echo bound-cmd-1", "-b", "2=echo bound-cmd-2", "test-pane-a"]
      description: "Launch with key bindings 1 and 2"

    - action: wait_for_screen
      contains: "[1/1]"
      timeout: 3s

    - action: send_keypress
      value: "1"
      description: "Press 1 to trigger first binding"

    - action: wait_for_screen
      contains: "[2/2]"
      timeout: 3s
      description: "Binding should create a new pane"

    - action: send_keypress
      value: "2"
      description: "Press 2 to trigger second binding"

    - action: wait_for_screen
      contains: "[3/3]"
      timeout: 3s
      description: "Second binding should create third pane"

    - action: capture_screenshot
      save_as: "three-panes-from-bindings.txt"

    - action: send_keypress
      value: "ctrl-q"
