scenario:
  name: "tmuch Session Picker"
  description: "Verify Ctrl-S opens session picker, j/k navigates, Enter selects, Esc cancels"
  type: tui
  tags: [critical, tui, session-picker]

  prerequisites:
    - "./target/release/tmuch binary exists"
    - "tmux is installed"
    - "At least 2 tmux sessions exist"

  steps:
    - action: launch
      target: "./target/release/tmuch"
      args: ["test-pane-a"]
      description: "Launch with one session"

    - action: wait_for_screen
      contains: "NORMAL"
      timeout: 3s

    - action: send_keypress
      value: "ctrl-s"
      description: "Open session picker"

    - action: wait_for_screen
      contains: "tmux sessions"
      timeout: 2s
      description: "Session picker overlay should appear"

    - action: verify_screen
      contains: "PICKER"
      description: "Status bar should show PICKER mode"

    - action: capture_screenshot
      save_as: "session-picker-open.txt"

    - action: send_keypress
      value: "j"
      description: "Navigate down in picker"

    - action: send_keypress
      value: "enter"
      description: "Select session"

    - action: wait_for_screen
      contains: "[2/2]"
      timeout: 3s
      description: "Selected session should be added as new pane"

    - action: send_keypress
      value: "ctrl-q"
