scenario:
  name: "tmuch Pane Focus and Input Forwarding"
  description: "Verify Enter focuses a pane, keystrokes forward to tmux, Esc unfocuses"
  type: tui
  tags: [critical, tui, input]

  prerequisites:
    - "./target/release/tmuch binary exists"
    - "tmux is installed"

  steps:
    - action: launch
      target: "./target/release/tmuch"
      args: ["test-pane-a"]
      description: "Launch with one session"

    - action: wait_for_screen
      contains: "NORMAL"
      timeout: 3s

    - action: send_keypress
      value: "enter"
      description: "Enter pane-focused mode"

    - action: wait_for_screen
      contains: "FOCUSED"
      timeout: 2s
      description: "Status bar should show FOCUSED mode"

    - action: verify_screen
      contains: "ATTACHED"
      description: "Pane title should show ATTACHED"

    - action: capture_screenshot
      save_as: "pane-focused-mode.txt"

    - action: send_keypress
      value: "escape"
      description: "Exit pane-focused mode"

    - action: wait_for_screen
      contains: "NORMAL"
      timeout: 2s
      description: "Should return to NORMAL mode"

    - action: send_keypress
      value: "ctrl-q"
