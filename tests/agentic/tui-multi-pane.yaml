scenario:
  name: "tmuch TUI Multi-Pane Display"
  description: "Verify TUI shows multiple tmux sessions side-by-side with correct layout"
  type: tui
  tags: [critical, tui, layout]

  prerequisites:
    - "./target/release/tmuch binary exists"
    - "tmux is installed"

  steps:
    - action: launch
      target: "./target/release/tmuch"
      args: ["test-pane-a", "test-pane-b"]
      description: "Launch with two existing tmux sessions"

    - action: wait_for_screen
      contains: "test-pane-a"
      timeout: 3s
      description: "First pane title should appear"

    - action: verify_screen
      contains: "test-pane-b"
      description: "Second pane title should appear"

    - action: verify_screen
      contains: "NORMAL"
      description: "Status bar should show NORMAL mode"

    - action: verify_screen
      contains: "[2/2]"
      description: "Status bar should show 2 panes"

    - action: capture_screenshot
      save_as: "two-panes-side-by-side.txt"
      description: "Capture the two-pane layout"

    - action: send_keypress
      value: "ctrl-q"
      description: "Quit tmuch"
